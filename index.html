<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pengumuman SHTKA</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
      }

      html,
      body {
        height: 100%;
      }

      body {
        background: #f4f6f9;
        display: flex;
        flex-direction: column;
      }

      /* Area utama */
      .main {
        flex: 1;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }

      /* Card */
      .card {
        max-width: 600px;
        width: 100%;
        background: #fff;
        padding: 35px;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        text-align: center;
      }

      h1 {
        color: #d32f2f;
        margin-bottom: 15px;
      }

      p {
        color: #555;
        line-height: 1.7;
        margin-bottom: 20px;
      }

      #countdown {
        font-size: 42px;
        font-weight: bold;
        color: #1976d2;
        margin: 25px 0;
      }

      .btn {
        display: inline-block;
        padding: 15px 35px;
        background: #1976d2;
        color: #fff;
        text-decoration: none;
        border-radius: 8px;
        font-size: 18px;
        transition: 0.3s;
      }

      .btn:hover {
        background: #0d47a1;
      }

      .disabled {
        background: #999 !important;
        pointer-events: none;
        cursor: not-allowed;
      }

      .note {
        margin-top: 20px;
        color: #d32f2f;
        font-weight: bold;
      }

      /* Footer */
      footer {
        background: #ffffff;
        border-top: 1px solid #ddd;
        text-align: center;
        padding: 18px;
        color: #777;
        font-size: 14px;
      }

      footer strong {
        color: #333;
      }

      @media (max-width: 600px) {
        .card {
          padding: 25px;
        }

        #countdown {
          font-size: 34px;
        }

        .btn {
          width: 100%;
        }
      }
    </style>
  </head>

  <body>
    <main class="main">
      <div class="card">
        <h1>📢 Pengumuman SHTKA</h1>

        <p>
          Siswa dapat mengunduh <strong>SHTKA</strong> melalui tautan di bawah
          ini. Silakan segera mengaksesnya sebelum waktu habis. Setelah hitung
          mundur mencapai <strong>00:00:00</strong>, link akan dinonaktifkan
          secara otomatis. <br /><br />
          <strong>Terima kasih.</strong>
        </p>

        <div id="countdown">48:00:00</div>

        <a
          id="downloadBtn"
          class="btn"
          href="https://drive.google.com/drive/folders/1jG3oe5vTg1-yB07-rve2wPYyMA7PfSMx?usp=drive_link"
          target="_blank"
        >
          🔗 Buka Link
        </a>

        <div id="expiredMessage" class="note"></div>
      </div>
    </main>

    <footer>
      &copy; 2026 <strong>SMP negeri 1 Srono</strong>. All Rights Reserved.
    </footer>

    <script>
      // Durasi countdown (48 jam)
      const COUNTDOWN_DURATION = 48 * 60 * 60 * 1000; // dalam milidetik
      const STORAGE_KEY = "shtka_end_time";

      const countdown = document.getElementById("countdown");
      const btn = document.getElementById("downloadBtn");
      const msg = document.getElementById("expiredMessage");

      // Ambil waktu selesai dari localStorage
      let endTime = localStorage.getItem(STORAGE_KEY);

      // Jika belum ada, buat baru
      if (!endTime) {
        endTime = Date.now() + COUNTDOWN_DURATION;
        localStorage.setItem(STORAGE_KEY, endTime);
      } else {
        endTime = parseInt(endTime);
      }

      function updateCountdown() {
        const now = Date.now();
        const distance = endTime - now;

        if (distance <= 0) {
          countdown.innerHTML = "00:00:00";

          btn.classList.add("disabled");
          btn.removeAttribute("href");

          msg.innerHTML = "⛔ Link telah dinonaktifkan.";

          clearInterval(timer);
          return;
        }

        const hours = Math.floor(distance / (1000 * 60 * 60));
        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((distance % (1000 * 60)) / 1000);

        countdown.innerHTML =
          String(hours).padStart(2, "0") +
          ":" +
          String(minutes).padStart(2, "0") +
          ":" +
          String(seconds).padStart(2, "0");
      }

      updateCountdown();
      const timer = setInterval(updateCountdown, 1000);
    </script>
  </body>
</html>
